<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background-color: #f8f9fa; font-family: sans-serif; }
    .navbar-brand { font-weight: bold; letter-spacing: 0.5px; }
    .card { border: none; box-shadow: 0 0.125rem 0.25rem rgba(0, 0, 0, 0.075); }
    .table-container { background: white; padding: 20px; border-radius: 8px; }
    #loader { display: flex; justify-content: center; align-items: center; min-height: 200px; }
  </style>
</head>
<body>

  <nav class="navbar navbar-dark bg-dark mb-4">
    <div class="container-fluid">
      <span class="navbar-brand mb-0 h1">📊 USER MONITORING SYSTEM (APP 2)</span>
      <span class="badge bg-success">Terhubung Aman ke Spreadsheet Utama</span>
    </div>
  </nav>

  <div class="container-fluid px-4">
    
    <div class="row mb-4">
      <div class="col-md-12">
        <div class="card bg-white p-3">
          <h5 class="text-muted mb-1">Status Koneksi Data</h5>
          <p class="mb-0 text-success fw-bold">● Live Data Terbaca Terpisah dari Aplikasi Pertama</p>
        </div>
      </div>
    </div>

    <div id="loader">
      <div class="spinner-border text-primary" role="status">
        <span class="visually-hidden">Memuat Data...</span>
      </div>
      <span class="ms-3 fw-semibold text-secondary">Sedang mengambil data dari spreadsheet asli...</span>
    </div>

    <div id="main-content" class="table-container d-none">
      <div class="d-flex justify-content-between align-items-center mb-3">
        <h4 class="m-0 text-dark">Daftar Log & Data User</h4>
        <button class="btn btn-sm btn-outline-primary fw-bold" onclick="muatUlangData()">🔄 Refresh Data</button>
      </div>
      
      <div class="table-responsive">
        <table class="table table-striped table-hover align-middle">
          <thead id="tabel-head" class="table-dark">
            </thead>
          <tbody id="tabel-body">
            </tbody>
        </table>
      </div>
    </div>

  </div>

  <script>
    // Kode otomatis berjalan ketika halaman web app monitoring dibuka
    document.addEventListener("DOMContentLoaded", function() {
      muatUlangData();
    });

    function muatUlangData() {
      // Tampilkan animasi loading, sembunyikan tabel utama terlebih dahulu
      document.getElementById('loader').classList.remove('d-none');
      document.getElementById('main-content').classList.add('d-none');
      
      // Memanggil fungsi backend 'ambilDataUserAsli()' di file Code.gs secara asinkronus
      google.script.run
        .withSuccessHandler(tampilkanData)
        .withFailureHandler(tanganiError)
        .ambilDataUserAsli();
    }

    function tampilkanData(data) {
      // Sembunyikan loading, munculkan tabel utama
      document.getElementById('loader').classList.add('d-none');
      document.getElementById('main-content').classList.remove('d-none');

      const thead = document.getElementById('tabel-head');
      const tbody = document.getElementById('tabel-body');
      
      // Bersihkan tabel lama agar tidak double saat tombol refresh diklik
      thead.innerHTML = "";
      tbody.innerHTML = "";

      if (!data || data.length === 0) {
        tbody.innerHTML = "<tr><td class='text-center text-muted' colspan='100%'>Tidak ada data ditemukan di dalam spreadsheet Anda.</td></tr>";
        return;
      }

      // 1. MEMBUAT HEADER TABEL OTOMATIS (Berdasarkan Baris 1 di Spreadsheet)
      let headerRow = "<tr>";
      data[0].forEach(kolom => {
        headerRow += `<th>${kolom}</th>`;
      });
      headerRow += "</tr>";
      thead.innerHTML = headerRow;

      // 2. MEMASUKKAN BARIS DATA USER (Berdasarkan Baris 2 sampai terakhir di Spreadsheet)
      for (let i = 1; i < data.length; i++) {
        let bodyRow = "<tr>";
        data[i].forEach(sel => {
          let isiSel = sel;
          
          // Deteksi otomatis jika kolom bertipe tanggal/waktu agar rapi saat dibaca manusia
          if (sel instanceof Date || (typeof sel === 'string' && !isNaN(Date.parse(sel)) && sel.includes('T'))) {
            isiSel = new Date(sel).toLocaleString('id-ID');
          }
          
          bodyRow += `<td>${isiSel}</td>`;
        });
        bodyRow += "</tr>";
        tbody.innerHTML += bodyRow;
      }
    }

    function tanganiError(error) {
      document.getElementById('loader').classList.add('d-none');
      alert("Gagal memuat data spreadsheet: " + error.message);
    }
  </script>
</body>
</html>
